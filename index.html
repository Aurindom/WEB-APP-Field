    const key = el.dataset.noteKey;
    if (el.value.trim()) {
      proj.groupNotes[key] = el.value;
    } else {
      delete proj.groupNotes[key];
    }
    saveApp();
    return;
  }

  if (action === 'del-serial') {
    e.stopPropagation();
    deleteSerial(el.dataset.serialKey, el.dataset.serialVal);
    render();
    toast('Serial removed');
    return;
  }

  if (action === 'add-serial-manual') {
    const key = el.dataset.serialKey;
    const safeKey = el.dataset.safeKey || key.replace(/:/g, '-');
    const input = document.getElementById(`serial-add-${safeKey}`);
    const val = input?.value.trim();
    if (val) { saveSerial(key, val); render(); toast('Serial added'); }
    return;
  }
});


/* ══════════════════════════════════════════
   AI features
══════════════════════════════════════════ */

async function handleSuggestGroup(description, btn) {
  const origText = btn.textContent;
  btn.disabled = true;
  btn.textContent = '...';
  try {
    const result = await callSuggestGroup(description);
    btn.disabled = false;
    btn.textContent = origText;

    if (result.status === 'no-key') {
      toast('Add your Anthropic API key — tap ☰ → Anthropic API Key');
      return;
    }
    if (result.status === 'offline') {
      toast('Backend not reachable — check connection');
      return;
    }

    const suggestions = result.suggestions || [];
    if (!suggestions.length) {
      toast('No matching groups found');
      return;
    }

    const groupIds = suggestions.map(s => s.group_id || s.groupId || s).filter(Boolean);
    if (VIEW.suggestTimer) clearTimeout(VIEW.suggestTimer);
    VIEW.suggestedGroups = groupIds;
    VIEW.collapsed = {};
    groupIds.forEach(gId => { VIEW.collapsed[gId] = false; });
    VIEW.suggestTimer = setTimeout(() => { VIEW.suggestedGroups = []; VIEW.suggestTimer = null; render(); }, 60000);
    render();

    const labelsHtml = groupIds.map(gId => `<div class="badge mb-1">${GROUPS[gId]?.label || gId}</div>`).join(' ');
    showModal(`
      <div class="font-bold text-lg mb-3">AI Suggestions</div>
      <p class="text-sm text-gray-700 mb-3">Based on: "<em>${escHtml(description)}</em>"</p>
      <div class="mb-3">${labelsHtml}</div>
      <p class="text-sm text-gray-500 mb-4">These groups are now highlighted. Review and check items — nothing is auto-selected.</p>
      <button class="btn w-full" data-action="close-modal">Got it</button>
    `);
  } catch {
    btn.disabled = false;
    btn.textContent = origText;
    toast('Suggestion failed — try again');
  }
}

async function handleScanSerial(roomType, instanceId, groupId, itemId) {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';

  input.addEventListener('change', async () => {
    const file = input.files && input.files[0];
    if (!file) return;

    showModal(`
      <div class="font-bold text-lg mb-3">Scanning Serial Number</div>
      <div class="text-center py-4">
        <div style="font-size:2rem;margin-bottom:.75rem">🔍</div>
        <div class="text-sm text-gray-600">Analyzing image...</div>
      </div>
    `);

    try {
      const blob = await compressToJpegBlob(file, 3000, 0.98);
      const result = await callParseSerial(blob);

      if (result.status === 'no-key') {
        const noKeySerialKey = `${roomType}:${instanceId}:${groupId}:${itemId}`;
        showModal(`
          <div class="font-bold text-lg mb-3">Anthropic API Key Required</div>
          <p class="text-sm text-gray-700 mb-2">Paste your key to enable AI scanning:</p>
          <input type="password" class="input mb-2" id="inline-key-input" placeholder="sk-ant-..." autocomplete="off" />
          <div class="row mb-4" style="justify-content:flex-end;gap:.5rem">
            <button class="btn btn-secondary" data-action="close-modal">Cancel</button>
            <button class="btn btn-primary" id="inline-key-save">Save Key</button>
          </div>
          <p class="text-sm text-gray-500 mb-2">Or enter serial manually:</p>
          ${manualSerialForm(roomType, instanceId, groupId, itemId)}
        `);
        setTimeout(() => {
          document.getElementById('inline-key-save')?.addEventListener('click', () => {
            const val = document.getElementById('inline-key-input')?.value.trim();
            if (!val) { toast('Enter a key first'); return; }
            APP.geminiKey = val;
            saveApp();
            closeModal();
            toast('Key saved — tap Scan again');
          });
          wireManualSerialForm(noKeySerialKey);
        }, 50);
        return;
      }

      if (result.status === 'offline') {
        showModal(`
          <div class="font-bold text-lg mb-3">Backend Offline</div>
          <p class="text-sm text-gray-700 mb-4">Enter serial manually below.</p>
          ${manualSerialForm(roomType, instanceId, groupId, itemId)}
        `);
        return;
      }

      const { status, serial, pass1, pass2 } = result;
      const serialKey = `${roomType}:${instanceId}:${groupId}:${itemId}`;

      if (status === 'high') {
        showModal(`
          <div class="font-bold text-lg mb-3">Serial Found</div>
          <div class="card card-sm mb-3 text-center">
            <div class="text-xs text-gray-500 mb-1">High confidence — verify and correct if needed</div>
            <div class="font-bold text-lg text-blue-600 mb-2">${escHtml(serial || '')}</div>
          </div>
          <input id="confirm-serial-input" type="text" class="input mb-3" value="${escHtml(serial || '')}" placeholder="Serial number" />
          <div class="row" style="justify-content:flex-end;gap:.5rem">
            <button class="btn btn-secondary" data-action="close-modal">Re-scan</button>
            <button class="btn btn-green" id="confirm-serial" data-key="${serialKey}">Confirm</button>
          </div>
        `);
        document.getElementById('confirm-serial')?.addEventListener('click', (e) => {
          const val = document.getElementById('confirm-serial-input')?.value.trim() || serial || '';
          saveSerial(e.target.dataset.key, val);
          closeModal();
          render();
          toast('Serial saved');
        });
      } else if (status === 'low') {
        const opts = [...new Set([pass1, ...(pass2 || [])].filter(Boolean))];
        let optsHtml = opts.map(v => `<button class="btn btn-secondary w-full mb-2 confirm-serial-opt" data-key="${serialKey}" data-val="${escHtml(v)}">${escHtml(v)}</button>`).join('');
        showModal(`
          <div class="font-bold text-lg mb-3">Low Confidence Read</div>
          <p class="text-sm text-gray-700 mb-3">Select the correct value or enter manually:</p>
          ${optsHtml}
          ${manualSerialForm(roomType, instanceId, groupId, itemId)}
        `);
        document.querySelectorAll('.confirm-serial-opt').forEach(btn => {
          btn.addEventListener('click', e => {
            saveSerial(e.target.dataset.key, e.target.dataset.val);
            closeModal();
            render();
            toast('Serial saved');
          });
        });
      } else {
        showModal(`
          <div class="font-bold text-lg mb-3">Could Not Read</div>
          <p class="text-sm text-gray-700 mb-3">Enter serial number manually:</p>
          ${manualSerialForm(roomType, instanceId, groupId, itemId)}
        `);
      }

      wireManualSerialForm(serialKey);

    } catch {
      closeModal();
      toast('Scan failed — enter manually');
    }
  });

  input.click();
}

function manualSerialForm(roomType, instanceId, groupId, itemId) {
  const serialKey = `${roomType}:${instanceId}:${groupId}:${itemId}`;
  return `<div class="row mt-2" style="gap:.5rem">
    <input type="text" class="input grow" id="manual-serial-input" placeholder="Enter serial number" />
    <button class="btn shrink-0" id="manual-serial-save" data-key="${serialKey}">Add</button>
  </div>
  <button class="btn btn-secondary w-full mt-2" data-action="close-modal">Close</button>`;
}

function wireManualSerialForm(serialKey) {
  setTimeout(() => {
    document.getElementById('manual-serial-save')?.addEventListener('click', (e) => {
      const val = document.getElementById('manual-serial-input')?.value.trim();
      if (val) {
        saveSerial(e.target.dataset.key, val);
        closeModal();
        render();
        toast('Serial saved');
      }
    });
  }, 50);
}

function saveSerial(key, value) {
  if (!value) return;
  const proj = getProject();
  if (!proj) return;
  if (!proj.serials) proj.serials = {};
  const existing = getSerials(key);
  if (!existing.includes(value)) existing.push(value);
  proj.serials[key] = existing;
  saveApp();
}

function deleteSerial(key, value) {
  const proj = getProject();
  if (!proj?.serials) return;
  proj.serials[key] = getSerials(key).filter(s => s !== value);
  saveApp();
}
</script>

<script>
/* ══════════════════════════════════════════
   Install prompt (iOS + Android)
══════════════════════════════════════════ */
(() => {
  const DISMISS_KEY = 'fieldscope-install-dismissed-v2';
  const banner = document.getElementById('install-banner');
  const text = document.getElementById('install-text');
  const actionBtn = document.getElementById('install-action');
  const dismissBtn = document.getElementById('install-dismiss');
  if (!banner) return;

  let deferred = null;

  const isIos = () => /iphone|ipad|ipod/i.test(navigator.userAgent) && !window.MSStream;
  const isStandalone = () => window.matchMedia('(display-mode:standalone)').matches || navigator.standalone === true;
  const wasDismissed = () => localStorage.getItem(DISMISS_KEY) === '1';

  function show() { if (!wasDismissed() && !isStandalone()) banner.classList.remove('hidden'); }
  function hide() { banner.classList.add('hidden'); }

  dismissBtn.addEventListener('click', () => { localStorage.setItem(DISMISS_KEY,'1'); hide(); });

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferred = e;
    text.textContent = 'Install for offline use.';
    actionBtn.classList.remove('hidden');
    show();
  });

  actionBtn.addEventListener('click', async () => {
    if (!deferred) return;
    deferred.prompt();
    const { outcome } = await deferred.userChoice;
    deferred = null;
    actionBtn.classList.add('hidden');
    if (outcome === 'accepted') hide();
  });

  window.addEventListener('appinstalled', () => { localStorage.setItem(DISMISS_KEY,'1'); hide(); });

  if (isIos() && !isStandalone()) {
    text.innerHTML = 'Install: tap <strong>⎙ Share</strong> then <strong>Add to Home Screen</strong>.';
    show();
  }
})();
</script>

  if (!APP.projects.length) newProject('My First Property');

});
